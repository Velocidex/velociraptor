services:
  velociraptor-server:
    image: ghcr.io/velocidex/velociraptor-server:latest
    ports:
      - "${VELOCIRAPTOR_FRONTEND_PORT}:${VELOCIRAPTOR_FRONTEND_PORT}"
      - "${VELOCIRAPTOR_GUI_PORT}:${VELOCIRAPTOR_GUI_PORT}"
    environment:
      - VELOCIRAPTOR_HOSTNAME=${VELOCIRAPTOR_HOSTNAME}
      - VELOCIRAPTOR_FRONTEND_PORT=${VELOCIRAPTOR_FRONTEND_PORT}
      - VELOCIRAPTOR_GUI_PORT=${VELOCIRAPTOR_GUI_PORT}
      - VELOCIRAPTOR_DATASTORE_PATH=${VELOCIRAPTOR_DATASTORE_PATH}
      - VELOCIRAPTOR_CONFIG_PATH=${VELOCIRAPTOR_CONFIG_PATH}
      - VELOCIRAPTOR_INITIAL_ADMIN_PASSWORD=${VELOCIRAPTOR_INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./etc/:/etc/velociraptor/
      - ./datastore/:/datastore/
