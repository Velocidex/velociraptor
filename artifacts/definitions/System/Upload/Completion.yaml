name: System.Upload.Completion
description: |
  An internal artifact that produces events for every file that is
  uploaded to the system. This also includes when importing an offline
  collection.

  You can monitor this queue using the `watch_monitoring()`
  plugin. This can be used as a building block in implementing more
  complex workflows for automatically post processing a completed
  upload.

  If you do implement post processing workflows, you can also manually
  trigger them (e.g. for testing or to replay them) using the
  `send_event()` VQL function.


type: CLIENT_EVENT
