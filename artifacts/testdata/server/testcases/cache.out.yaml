# Demonstrate how caches are created using lambda functions. This is
# the modern and prefered API for the cache() function.
Query: LET _ <= cache( name="Once", lambda='''x=>log(message="I Ran with %v", args=x, dedup= -1) && (x + 5)''', period=999999, max_size=100)
Output: []

# The following calls will use the same cache.
Query: SELECT cache(name="Once", key=5) AS C5, cache(name="Once", key=5) AS C5_2, cache(name="Once", key=10) AS C10 FROM scope()
Output: [
 {
  "C5": 10,
  "C5_2": 10,
  "C10": 15
 }
]

