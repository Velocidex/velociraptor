# Add a timeline to a new SuperTimeline. If message_column is not
# specified it should build a useful message from the row
Query: SELECT timeline_add( timeline="SuperTimeline", name="Test Timeline", query=T, notebook_id=NotebookId, key="Timestamp") AS TimelineAdd FROM scope()
